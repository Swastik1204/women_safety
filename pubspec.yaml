name: aanchal
description: "Aanchal — Women safety platform for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Maps & Location — OpenStreetMap (no API key required)
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_app_check: ^0.3.2+8
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_database: ^11.3.4
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.10
  google_sign_in: ^6.3.0

  # WebRTC / Calling
  flutter_webrtc: ^1.3.0
  web_socket_channel: ^3.0.1
  flutter_callkit_incoming: ^3.0.0
  wakelock_plus: ^1.2.8

  # Utilities
  url_launcher: ^6.3.1
  logger: ^2.5.0
  shared_preferences: ^2.5.3
  flutter_tts: ^4.0.2
  flutter_local_notifications: ^17.0.0
  flutter_contacts: ^1.1.9+2
  flutter_reactive_ble: ^5.3.2
  flutter_background_service: ^5.0.12
  flutter_background_service_android: ^6.2.8
  google_maps_flutter: ^2.9.0
  speech_to_text: ^7.3.0
  flutter_sound: ^9.2.13
  path_provider: ^2.1.4
  camera: ^0.11.0+2
  image_picker: ^1.2.1
  watch_connectivity: ^0.2.4
  workmanager: ^0.9.0

  # Networking (backend / REST)
  http: ^1.3.0

  # State management
  flutter_riverpod: ^2.6.1

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
    - assets/map/

